# Power savings
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Disable mouse if not needed (saves power)
# CONFIG_ZMK_POINTING=y

# Bluetooth power optimization
CONFIG_BT=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_CONN_PARAM_UPDATE=y

# Enable BLE deep sleep when idle
CONFIG_BT_SLEEP=y

# Disable unused features
# CONFIG_LOG=y

# Optimize RAM usage
CONFIG_ZMK_KSCAN_DEBOUNCE=5
