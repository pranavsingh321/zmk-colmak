# Power savings
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Mouse/pointing support (required for mouse keycodes in keymap)
CONFIG_ZMK_POINTING=y

# Bluetooth power optimization
CONFIG_BT=y
CONFIG_BT_EXT_ADV=y
CONFIG_BT_CONN_PARAM_UPDATE=y

# Disable unused features
# CONFIG_LOG=y

# Optimize debounce (faster response = less time active)
CONFIG_ZMK_DEBOUNCE_TYPE=eager
CONFIG_ZMK_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_DEBOUNCE_RELEASE_MS=5
